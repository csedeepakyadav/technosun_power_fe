<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0f7b58"/>

  <!-- Sun rays (8 rays) -->
  <g stroke="#FFC947" stroke-linecap="round" stroke-width="2.8">
    <line x1="32" y1="8"  x2="32" y2="14"/>
    <line x1="32" y1="50" x2="32" y2="56"/>
    <line x1="8"  y1="32" x2="14" y2="32"/>
    <line x1="50" y1="32" x2="56" y2="32"/>
    <line x1="14.7" y1="14.7" x2="18.9" y2="18.9"/>
    <line x1="45.1" y1="45.1" x2="49.3" y2="49.3"/>
    <line x1="49.3" y1="14.7" x2="45.1" y2="18.9"/>
    <line x1="18.9" y1="45.1" x2="14.7" y2="49.3"/>
  </g>

  <!-- Sun core -->
  <circle cx="32" cy="32" r="10" fill="#FFC947"/>

  <!-- Solar panel lines on sun -->
  <line x1="32" y1="23" x2="32" y2="41" stroke="#0f7b58" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="23" y1="32" x2="41" y2="32" stroke="#0f7b58" stroke-width="1.2" stroke-linecap="round"/>
</svg>
